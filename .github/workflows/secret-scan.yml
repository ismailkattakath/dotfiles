name: Secret Scan

# Runs on a self-hosted runner (not GitHub-hosted) to keep Actions usage on
# owned infrastructure. This CI scan is a backstop — the primary guard is the
# local .githooks/pre-commit gitleaks hook that runs on every commit.
on:
  push:
    branches: [main]

# Least-privilege: the scan only needs to read the checkout.
permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
