name: Secret Scan

# Runs on a GitHub-hosted runner. This CI scan is a backstop — the primary
# guard is the local .githooks/pre-commit gitleaks hook that runs on every
# commit. (This repo is public, so a self-hosted runner is intentionally NOT
# used: PR workflows on public repos can run untrusted code.)
on:
  push:
    branches: [main]

# Least-privilege: the scan only needs to read the checkout.
permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
